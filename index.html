<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wondi.ai — Mental Health Safety for AI</title>
  <meta name="description" content="The mental health safety layer for every AI talking to a teenager." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'SFT Schrifted Sans';
      src: url('./fonts/SFT-Schrifted-Sans.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cyber-blue: #4A53FF;
      --white: #FFFFFF;
      --night-black: #0A0A0A;
      --golden-hour: #E9C461;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--white);
      color: var(--night-black);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Nav ── */
    nav {
      padding: 36px 48px;
    }

    .logo {
      font-family: 'SFT Schrifted Sans', 'Inter', sans-serif;
      font-size: 30px;
      font-weight: 500;
      color: var(--cyber-blue);
      letter-spacing: -0.3px;
      user-select: none;
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px 100px;
    }

    /* Coming Soon pill */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(74, 83, 255, 0.07);
      border: 1px solid rgba(74, 83, 255, 0.2);
      color: var(--cyber-blue);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 16px;
      border-radius: 100px;
      margin-bottom: 52px;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      background: var(--cyber-blue);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* Headline */
    h1 {
      font-family: 'SFT Schrifted Sans', 'Inter', sans-serif;
      font-size: clamp(38px, 6.5vw, 76px);
      font-weight: 500;
      line-height: 1.08;
      letter-spacing: -1.5px;
      color: var(--night-black);
      max-width: 820px;
    }

    h1 em {
      font-style: normal;
      color: var(--cyber-blue);
    }

    /* Subtext */
    .sub {
      margin-top: 28px;
      font-size: clamp(15px, 1.6vw, 18px);
      font-weight: 400;
      line-height: 1.65;
      color: rgba(10, 10, 10, 0.45);
      max-width: 480px;
    }

    /* ── Footer ── */
    footer {
      padding: 28px 48px;
      text-align: center;
      font-size: 12px;
      color: rgba(10, 10, 10, 0.25);
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.02em;
    }

    /* ── Grid background ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .grid-plane {
      position: absolute;
      width: 220%;
      height: 130%;
      left: -60%;
      top: 28%;
      background-image:
        linear-gradient(rgba(74, 83, 255, 0.14) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74, 83, 255, 0.14) 1px, transparent 1px);
      background-size: 56px 56px;
      transform: perspective(480px) rotateX(68deg);
      transform-origin: top center;
      -webkit-mask-image: radial-gradient(ellipse 75% 70% at 50% 0%, black 10%, transparent 100%);
      mask-image: radial-gradient(ellipse 75% 70% at 50% 0%, black 10%, transparent 100%);
    }

    /* Vanishing-point glow */
    .grid-glow {
      position: absolute;
      width: 700px;
      height: 400px;
      left: 50%;
      top: 26%;
      transform: translateX(-50%);
      background: radial-gradient(ellipse at center top, rgba(74, 83, 255, 0.07) 0%, transparent 65%);
    }

    /* White vignette — keeps text readable */
    .grid-vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 42%, rgba(255,255,255,1) 25%, rgba(255,255,255,0.55) 60%, transparent 100%);
    }

    nav, .hero, footer {
      position: relative;
      z-index: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      nav { padding: 28px 24px; }
      .hero { padding: 40px 20px 80px; }
      h1 { letter-spacing: -0.8px; }
      footer { padding: 24px; }
    }
  </style>
</head>
<body>

  <!-- Background grid -->
  <div class="grid-bg" aria-hidden="true">
    <div class="grid-plane"></div>
    <div class="grid-glow"></div>
    <div class="grid-vignette"></div>
  </div>

  <nav>
    <div class="logo">wondi</div>
  </nav>

  <section class="hero">
    <div class="badge">
      <span class="badge-dot"></span>
      Coming Soon
    </div>

    <h1>The mental health safety layer for every <em>AI</em> talking to a teenager</h1>

    <p class="sub">Wondi.ai protects the mental wellbeing of young users — built for every platform powered by AI.</p>
  </section>

  <footer>© 2026 Wondi.ai · All rights reserved</footer>

</body>
</html>
