<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wondi — Trajectory Detection</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0b0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
  }

  .scene {
    position: relative;
    width: 800px;
    height: 480px;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.7);
  }

  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .label {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
    white-space: nowrap;
  }
  .label-intervention {
    color: #f59e0b;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.3);
  }
  .label-safe {
    color: #3fb950;
    background: rgba(63,185,80,0.10);
    border: 1px solid rgba(63,185,80,0.25);
  }
  .label.visible { opacity: 1; }

  .watermark {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: rgba(139,148,158,0.3);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <canvas id="c"></canvas>
  <div class="label label-intervention" id="lbl-intervention">⬡ Intervention triggered</div>
  <div class="label label-safe" id="lbl-safe">✓ Trajectory redirected</div>
  <div class="watermark">Wondi · Trajectory Detection</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const scene  = document.getElementById('scene');
const lblIntervention = document.getElementById('lbl-intervention');
const lblSafe         = document.getElementById('lbl-safe');

function resize() {
  canvas.width  = scene.offsetWidth;
  canvas.height = scene.offsetHeight;
}
resize();
const W = () => canvas.width;
const H = () => canvas.height;

const LOOP = 7000; // ms per hero loop
let startTime = null;

// ── Danger Zone — always visible, heartbeat pulse ─────────────────────────
const DZ = {
  cx: () => W() * 0.81,
  cy: () => H() * 0.73,
  r:  () => Math.min(W(), H()) * 0.20,
};

function drawDangerZone(ctx, now, heroPhase) {
  const cx = DZ.cx(), cy = DZ.cy(), r = DZ.r();

  // Flicker: fast random-ish oscillation using multiple sine waves at different frequencies
  const flicker = 0.82
    + Math.sin(now * 0.018) * 0.06
    + Math.sin(now * 0.047) * 0.05
    + Math.sin(now * 0.091) * 0.04
    + Math.sin(now * 0.200) * 0.03;

  // extra intensity when hero is close
  let heroBoost = 0;
  if (heroPhase > 0.42 && heroPhase < 0.72) {
    heroBoost = Math.sin(Math.PI * (heroPhase - 0.42) / 0.30) * 0.5;
  }

  const baseIntensity = flicker + heroBoost;

  // outermost ambient heat
  const grd0 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.2);
  grd0.addColorStop(0,   `rgba(180,45,20,${0.06 * baseIntensity})`);
  grd0.addColorStop(0.5, `rgba(150,30,10,${0.04 * baseIntensity})`);
  grd0.addColorStop(1,   'rgba(120,20,5,0)');
  ctx.fillStyle = grd0;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 2.2, 0, Math.PI * 2);
  ctx.fill();

  // mid bloom
  const grd1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.4);
  grd1.addColorStop(0,   `rgba(220,60,25,${0.14 * baseIntensity})`);
  grd1.addColorStop(0.5, `rgba(190,45,15,${0.10 * baseIntensity})`);
  grd1.addColorStop(1,   'rgba(160,30,10,0)');
  ctx.fillStyle = grd1;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 1.4, 0, Math.PI * 2);
  ctx.fill();

  // inner core
  const grd2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grd2.addColorStop(0,   `rgba(255,110,50,${0.24 * baseIntensity})`);
  grd2.addColorStop(0.55,`rgba(220,65,25,${0.16 * baseIntensity})`);
  grd2.addColorStop(1,   'rgba(180,40,15,0)');
  ctx.fillStyle = grd2;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fill();

  // bright core flicker
  const coreAlpha = 0.10 * baseIntensity;
  const grd3 = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.4);
  grd3.addColorStop(0, `rgba(255,160,80,${coreAlpha})`);
  grd3.addColorStop(1, 'rgba(255,100,40,0)');
  ctx.fillStyle = grd3;
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.4, 0, Math.PI * 2);
  ctx.fill();

  // "risk zone" label — positioned just above the heat center
  const labelX = cx;
  const labelY = cy - r * 0.55;
  ctx.font = '500 9px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  const labelAlpha = Math.min(1, baseIntensity * 0.7);
  ctx.fillStyle = `rgba(255,120,60,${labelAlpha})`;
  ctx.fillText('risk zone', labelX, labelY);
  ctx.textAlign = 'left'; // reset
}

// ── Ambient lines — slow, diverse trajectories, with user ID labels ────────
// 8 distinct path templates: direction, curvature, entry/exit sides all vary
// Hero speed reference
const HERO_SPEED = (800 * 1.05) / 7000; // ~0.120 px/ms

// DZ is at bottom-right: cx~0.81, cy~0.73, r~0.20 of min(W,H)
// Exclusion zone roughly: x > 0.60 AND y > 0.55
// Lines are more chaotic — different entry/exit sides, diagonal, curved, some exit top/bottom
// Opacity lowered so hero stands out clearly
const LINE_DEFS = [
  // Enters left-mid, arcs UP and exits top-right
  { id: '#1184', rgb: [100,170,255], speed: HERO_SPEED * 0.92, tail: 160, rtl: false,
    pts: [{x:0,y:0.52},{x:0.18,y:0.40},{x:0.36,y:0.22},{x:0.58,y:0.10},{x:0.80,y:0.04},{x:1.05,y:0.08}] },

  // Enters top-left, diagonal down to mid-right (stays away from DZ by curving up at x=0.60)
  { id: '#2847', rgb: [160,120,255], speed: HERO_SPEED * 1.05, tail: 170, rtl: false,
    pts: [{x:0.08,y:0},{x:0.20,y:0.18},{x:0.38,y:0.32},{x:0.55,y:0.40},{x:0.68,y:0.36},{x:0.88,y:0.28},{x:1.05,y:0.32}] },

  // Nearly horizontal top strip, slight wave
  { id: '#3092', rgb: [80,210,220], speed: HERO_SPEED * 0.88, tail: 150, rtl: false,
    pts: [{x:0,y:0.12},{x:0.22,y:0.08},{x:0.44,y:0.14},{x:0.66,y:0.09},{x:0.88,y:0.13},{x:1.05,y:0.10}] },

  // Enters bottom-left, curves steeply UP, exits mid-right (avoids DZ by turning at x=0.55)
  { id: '#4455', rgb: [100,225,180], speed: HERO_SPEED * 0.95, tail: 160, rtl: false,
    pts: [{x:0,y:0.88},{x:0.14,y:0.72},{x:0.28,y:0.55},{x:0.42,y:0.40},{x:0.56,y:0.32},{x:0.75,y:0.28},{x:1.05,y:0.34}] },

  // Enters right side (RTL), diagonal toward top-left, exits top
  { id: '#5812', rgb: [200,150,255], speed: HERO_SPEED * 1.02, tail: 155, rtl: true,
    pts: [{x:1.05,y:0.60},{x:0.82,y:0.50},{x:0.60,y:0.38},{x:0.40,y:0.24},{x:0.22,y:0.12},{x:0.08,y:0}] },

  // Enters right-top (RTL), sweeps left in a wide arc, exits bottom-left
  { id: '#7341', rgb: [140,200,255], speed: HERO_SPEED * 0.90, tail: 165, rtl: true,
    pts: [{x:1.05,y:0.18},{x:0.80,y:0.24},{x:0.58,y:0.34},{x:0.38,y:0.46},{x:0.18,y:0.60},{x:0,y:0.72}] },

  // Enters top-center, goes straight down, exits bottom (avoids DZ by staying x < 0.50)
  { id: '#6610', rgb: [255,180,100], speed: HERO_SPEED * 0.85, tail: 145, rtl: false,
    pts: [{x:0.28,y:0},{x:0.30,y:0.22},{x:0.26,y:0.44},{x:0.30,y:0.66},{x:0.28,y:0.88},{x:0.26,y:1.05}] },
];

// Pre-compute cumulative arc lengths for each line so we can do constant-speed travel
function buildLineData(def) {
  const pts  = def.pts;
  const segs = pts.length - 1;
  const SAMP = 200; // samples per segment
  const xs = [], ys = [], dists = [0];
  let total = 0;

  for (let s = 0; s < segs; s++) {
    const p0 = pts[s], p1 = pts[s+1];
    for (let i = 1; i <= SAMP; i++) {
      const t  = i / SAMP;
      const t0 = (i-1) / SAMP;
      // catmull-rom style: just lerp for now (linear segments)
      const x  = p0.x + (p1.x - p0.x) * t;
      const y  = p0.y + (p1.y - p0.y) * t;
      const px = p0.x + (p1.x - p0.x) * t0;
      const py = p0.y + (p1.y - p0.y) * t0;
      const d  = Math.hypot(x - px, y - py);
      total += d;
      xs.push(x); ys.push(y); dists.push(total);
    }
  }
  return { xs, ys, dists, total };
}

// Sample a position at arc-length distance `dist` (in fraction coords)
function sampleLine(data, dist) {
  const d = Math.max(0, Math.min(dist, data.total));
  let lo = 0, hi = data.dists.length - 1;
  while (lo < hi - 1) {
    const mid = (lo + hi) >> 1;
    if (data.dists[mid] <= d) lo = mid; else hi = mid;
  }
  const x = data.xs[lo] ?? data.xs[data.xs.length-1];
  const y = data.ys[lo] ?? data.ys[data.ys.length-1];
  return { x, y };
}

// Build all line data
const lines = LINE_DEFS.map(def => ({
  ...def,
  data: buildLineData(def),
  offset: Math.random() * 1000, // stagger start times
}));

function drawAmbientLine(ctx, line, now) {
  const w = W(), h = H();

  const totalPx  = line.data.total * w;
  const elapsed  = now + line.offset;
  const headPx   = (elapsed * line.speed) % totalPx;
  const tailPx   = Math.max(0, headPx - line.tail);
  const headFrac = headPx / totalPx * line.data.total;
  const tailFrac = tailPx / totalPx * line.data.total;

  const steps = 50;
  const [r,g,b] = line.rgb;

  // Trail
  ctx.beginPath();
  let first = true;
  for (let i = 0; i <= steps; i++) {
    const frac = tailFrac + (headFrac - tailFrac) * (i / steps);
    const {x: fx, y: fy} = sampleLine(line.data, frac);
    const px = fx * w, py = fy * h;
    if (first) { ctx.moveTo(px, py); first = false; }
    else ctx.lineTo(px, py);
  }
  ctx.strokeStyle = `rgba(${r},${g},${b},0.38)`;
  ctx.lineWidth   = 1.0;
  ctx.stroke();

  // Glowing head — dimmer
  const {x: hx, y: hy} = sampleLine(line.data, headFrac);
  const hpx = hx * w, hpy = hy * h;
  const grd = ctx.createRadialGradient(hpx, hpy, 0, hpx, hpy, 4);
  grd.addColorStop(0, `rgba(${r},${g},${b},0.65)`);
  grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.beginPath();
  ctx.arc(hpx, hpy, 4, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // User ID label — dimmer
  ctx.font = '9px JetBrains Mono, monospace';
  ctx.fillStyle = `rgba(${r},${g},${b},0.42)`;
  const labelOffsetX = line.rtl ? -58 : 8;
  ctx.fillText(`usr ${line.id}`, hpx + labelOffsetX, hpy - 5);
}

// ── Hero line ─────────────────────────────────────────────────────────────
function heroPath(phase) {
  const w = W(), h = H();
  const waypoints = [
    { x: -20,      y: h * 0.35 },
    { x: w * 0.22, y: h * 0.30 },
    { x: w * 0.42, y: h * 0.38 },
    { x: w * 0.56, y: h * 0.50 },
    { x: w * 0.63, y: h * 0.56 }, // closest approach — stops well before DZ core
    { x: w * 0.68, y: h * 0.50 }, // intervention bends it up-right
    { x: w * 0.80, y: h * 0.36 },
    { x: w + 20,   y: h * 0.26 },
  ];

  const segs = waypoints.length - 1;
  const segLen = 1 / segs;
  const seg = Math.min(segs - 1, Math.floor(phase / segLen));
  const t   = (phase - seg * segLen) / segLen;
  const a   = waypoints[seg];
  const bpt = waypoints[seg + 1];
  const s   = t * t * (3 - 2 * t);
  return { x: a.x + (bpt.x - a.x) * s, y: a.y + (bpt.y - a.y) * s };
}

function drawHero(ctx, phase) {
  const tail  = 0.20;
  const steps = 60;

  let alpha = 1;
  if (phase < 0.05) alpha = phase / 0.05;
  if (phase > 0.91) alpha = (1 - phase) / 0.09;

  // color: blue → amber (approaching) → green (safe)
  let r = 100, g = 175, b = 255;
  if (phase > 0.38 && phase < 0.60) {
    const t = (phase - 0.38) / 0.22;
    r = 100 + (245-100)*t; g = 175 + (158-175)*t; b = 255 + (11-255)*t;
  } else if (phase >= 0.60) {
    const t = Math.min(1, (phase - 0.60) / 0.14);
    r = 245 + (63-245)*t; g = 158 + (185-158)*t; b = 11 + (80-11)*t;
  }
  const ri = Math.round(r), gi = Math.round(g), bi = Math.round(b);

  // trail
  ctx.beginPath();
  let first = true;
  for (let i = 0; i <= steps; i++) {
    const s = Math.max(0, phase - tail) + (phase - Math.max(0, phase - tail)) * (i / steps);
    const {x, y} = heroPath(s);
    if (first) { ctx.moveTo(x, y); first = false; }
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = `rgba(${ri},${gi},${bi},${0.95 * alpha})`;
  ctx.lineWidth = 2.8;
  ctx.shadowColor = `rgba(${ri},${gi},${bi},0.8)`;
  ctx.shadowBlur  = 18;
  ctx.stroke();
  // second pass for extra glow
  ctx.lineWidth = 1.2;
  ctx.shadowBlur = 30;
  ctx.stroke();
  ctx.shadowBlur  = 0;

  // head glow — bigger and brighter
  const {x, y} = heroPath(phase);
  const grd = ctx.createRadialGradient(x, y, 0, x, y, 14);
  grd.addColorStop(0,   `rgba(${ri},${gi},${bi},${1.0*alpha})`);
  grd.addColorStop(0.4, `rgba(${ri},${gi},${bi},${0.6*alpha})`);
  grd.addColorStop(1,   `rgba(${ri},${gi},${bi},0)`);
  ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI*2);
  ctx.fillStyle = grd; ctx.fill();
  // bright inner dot
  ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI*2);
  ctx.fillStyle = `rgba(255,255,255,${0.9*alpha})`; ctx.fill();

  // user ID + risk score for hero
  if (alpha > 0.1) {
    ctx.font = '9px JetBrains Mono, monospace';

    // Always show the user ID
    ctx.fillStyle = `rgba(${ri},${gi},${bi},${0.7*alpha})`;
    ctx.fillText('usr #0847', x + 11, y - 12);

    // Risk score appears as it drifts toward danger
    if (phase > 0.33 && phase < 0.87) {
      let score;
      if (phase < 0.68) score = Math.round(8 + (phase - 0.33) / 0.35 * 60);
      else score = Math.round(Math.max(8, 68 - (phase - 0.68) / 0.19 * 45));
      ctx.fillStyle = `rgba(${ri},${gi},${bi},${0.65*alpha})`;
      ctx.fillText(`risk ${score}%`, x + 11, y - 1);
    }
  }
}

// ── Labels ────────────────────────────────────────────────────────────────
function updateLabels(phase) {
  const ahead = heroPath(Math.min(phase + 0.04, 1));

  if (phase > 0.54 && phase < 0.74) {
    lblIntervention.style.left = (ahead.x - 10) + 'px';
    lblIntervention.style.top  = (ahead.y - 30) + 'px';
    lblIntervention.classList.add('visible');
  } else {
    lblIntervention.classList.remove('visible');
  }

  if (phase > 0.71 && phase < 0.93) {
    lblSafe.style.left = (ahead.x - 10) + 'px';
    lblSafe.style.top  = (ahead.y - 30) + 'px';
    lblSafe.classList.add('visible');
  } else {
    lblSafe.classList.remove('visible');
  }
}

// ── Grid ──────────────────────────────────────────────────────────────────
function drawGrid(ctx) {
  const w = W(), h = H();
  ctx.strokeStyle = 'rgba(255,255,255,0.016)';
  ctx.lineWidth = 1;
  for (let x = 0; x < w; x += 60) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
  }
  for (let y = 0; y < h; y += 60) {
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
  }
}

// ── Frame loop ────────────────────────────────────────────────────────────
function frame(ts) {
  if (!startTime) startTime = ts;
  const elapsed = ts - startTime;
  const phase   = (elapsed % LOOP) / LOOP;

  ctx.clearRect(0, 0, W(), H());
  ctx.fillStyle = '#080a0e';
  ctx.fillRect(0, 0, W(), H());

  drawGrid(ctx);
  drawDangerZone(ctx, elapsed, phase);

  lines.forEach(line => drawAmbientLine(ctx, line, elapsed));
  drawHero(ctx, phase);
  updateLabels(phase);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
